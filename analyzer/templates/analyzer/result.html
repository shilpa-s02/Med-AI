<!DOCTYPE html>
<html>
<head>
    <title>AI Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-6">
                <img src="data:image/png;base64,{{ image_base64 }}" class="img-fluid rounded shadow">
            </div>
            <div class="col-md-6">
                <div class="result-container" style="background: #f8f9fa; border-left: 5px solid #007bff; padding: 20px; border-radius: 8px;">
                  <h3 style="color: #007bff;">AI Diagnostic Output</h3>
                <hr>
                <p style="white-space: pre-wrap; font-size: 1.1rem; line-height: 1.6;">
                  {{ analysis }}
                </p>
                </div>
                {% comment %} <h3>Medical Analysis</h3>
                <div class="p-3 bg-white border rounded shadow-sm">
                    {{ analysis|linebreaks }}
                </div> {% endcomment %}
                <a href="{% url 'index' %}" class="btn btn-outline-primary mt-3">Back to Upload</a>
            </div>
        </div>
    </div>
</body>
</html>

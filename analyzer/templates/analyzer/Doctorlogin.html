<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Doctor Login | MedAI Diagnose</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(to right, #0f4c75, #3282b8);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #ffffff;
            width: 380px;
            padding: 40px 35px;
            border-radius: 14px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.25);
        }

        .login-container h2 {
            text-align: center;
            color: #083d77;
            margin-bottom: 10px;
        }

        .login-container p {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            font-size: 14px;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #0f4c75;
            box-shadow: 0 0 4px rgba(15,76,117,0.5);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(to right, #083d77, #0f4c75);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .error {
            color: red;
            font-size: 14px;
            text-align: center;
            margin-bottom: 10px;
        }

        .footer-text {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .footer-text a {
            color: #083d77;
            text-decoration: none;
            font-weight: bold;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }

        .icon {
            text-align: center;
            font-size: 45px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="login-container">

    <div class="icon">👨‍⚕️</div>

    <h2>Doctor Login</h2>
    <p>Secure access to AI-powered diagnosis dashboard</p>

    {% comment %} {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %} {% endcomment %}

    <form method="post">
        {% csrf_token %}
        {% if messages %}
                    {% for message in messages %}
                        <p class="error-message">{{ message}}</p>
                    {% endfor %}
        {% endif %}

        <div class="input-group">
            <label>Email</label>
            <input type="text" name="email" placeholder="Enter your email" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="footer-text">
        Not registered?
        <a href="{% url 'doctorregister' %}">Create an account</a>
    </div>

</div>

</body>
</html>
